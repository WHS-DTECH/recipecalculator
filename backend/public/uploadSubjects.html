<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Subjects CSV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-include"></div>
    <script src="shared/navbar_loader.js"></script>
    <div class="container" style="max-width:600px;margin:2rem auto;background:#fff;padding:2rem;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
        <h1>Upload Subjects</h1>

        <details style="margin:0 0 1rem; border:1px solid #d8dee6; border-radius:10px; padding:0.75rem 0.9rem; background:#f8fbff;">
            <summary style="cursor:pointer; font-weight:700; color:#1f2937;">How to export Subjects.csv from Kamar</summary>
            <ol style="margin:0.8rem 0 0; padding-left:1.2rem; color:#1f2937;">
                <li style="margin-bottom:0.8rem;">
                    In Kamar, go to <strong>Setup</strong> then <strong>Subjects</strong>.
                    <div style="margin-top:0.45rem;">
                        <a href="images/kamar/upload-subjects/1-setup-subjects.png" target="_blank" rel="noopener noreferrer">
                            <img src="images/kamar/upload-subjects/1-setup-subjects.png" alt="Step 1: Setup then Subjects menu in Kamar" style="width:100%;max-width:520px;border:1px solid #cbd5e1;border-radius:8px;display:block;background:#fff;" loading="lazy">
                        </a>
                    </div>
                </li>
                <li style="margin-bottom:0.8rem;">
                    Open the <strong>Subjects</strong> screen and make sure all relevant subjects are visible.
                    <div style="margin-top:0.45rem;">
                        <a href="images/kamar/upload-subjects/2-subjects.png" target="_blank" rel="noopener noreferrer">
                            <img src="images/kamar/upload-subjects/2-subjects.png" alt="Step 2: Subjects list screen in Kamar" style="width:100%;max-width:520px;border:1px solid #cbd5e1;border-radius:8px;display:block;background:#fff;" loading="lazy">
                        </a>
                    </div>
                </li>
                <li style="margin-bottom:0.8rem;">
                    Click <strong>Actions</strong> then choose <strong>Spreadsheet</strong> export.
                    <div style="margin-top:0.45rem;">
                        <a href="images/kamar/upload-subjects/3-actions-spreadsheet.png" target="_blank" rel="noopener noreferrer">
                            <img src="images/kamar/upload-subjects/3-actions-spreadsheet.png" alt="Step 3: Actions menu showing Spreadsheet export" style="width:100%;max-width:520px;border:1px solid #cbd5e1;border-radius:8px;display:block;background:#fff;" loading="lazy">
                        </a>
                    </div>
                </li>
                <li>
                    Download the CSV file and then upload it on this page.
                    <div style="margin-top:0.45rem;">
                        <a href="images/kamar/upload-subjects/4-download-files.png" target="_blank" rel="noopener noreferrer">
                            <img src="images/kamar/upload-subjects/4-download-files.png" alt="Step 4: Download file dialog for Subjects CSV" style="width:100%;max-width:520px;border:1px solid #cbd5e1;border-radius:8px;display:block;background:#fff;" loading="lazy">
                        </a>
                    </div>
                </li>
            </ol>
        </details>

        <form id="uploadForm">
            <label for="csvFile">Upload Subjects CSV File:</label>
            <input type="file" id="csvFile" accept=".csv" required />
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin:0.85rem 0 0.6rem;">
                <div>
                    <label for="uploadYear">Upload Year</label>
                    <input type="number" id="uploadYear" min="2000" max="2100" value="2026" required />
                </div>
                <div>
                    <label for="uploadTerm">Upload Term</label>
                    <select id="uploadTerm" required>
                        <option>Term 1</option>
                        <option selected>Term 2</option>
                        <option>Term 3</option>
                        <option>Term 4</option>
                    </select>
                </div>
                <div>
                    <label for="uploadDate">Upload Date</label>
                    <input type="date" id="uploadDate" value="2026-04-30" required />
                </div>
            </div>
            <button type="submit">Upload</button>
        </form>
        <div id="uploadResult" style="margin-top:1.5rem;"></div>
    </div>
    <div id="classTableContainer" style="max-width:1400px;margin:2rem auto;padding:0 2rem;overflow-x:auto;"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="class_upload.js"></script>
</body>
</html>
