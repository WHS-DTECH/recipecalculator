<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Upload Recipes - URL</title>
	<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
	<link rel="stylesheet" href="admin_styles.css">
	<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
	<div id="cleanupProgressBar" style="display:none;position:fixed;top:0;left:0;width:100vw;height:6px;z-index:9999;background:#eee;">
		<div id="cleanupProgressFill" style="height:100%;width:0;background:#008080;transition:width 0.2s;"></div>
	</div>
	<!-- Dynamic Navbar Include -->
	<div id="navbar-include"></div>
	<script src="shared/navbar_loader.js"></script>
	<div class="setup-card main-content-margins">
		<h2>Upload Recipes - URL</h2>
		<div class="setup-section">
			<div class="setup-section-title">Load Recipe (URL)</div>
			<div class="setup-section-desc">Import recipe from a website URL.</div>
			<label class="recipe-url-label standout-label">Recipe URL:</label>
			<input type="text" class="setup-url-input wide-url-input super-wide-url-input" placeholder="e.g., https://www.chelsea.co.nz/browse-recipes/...">
			<button class="setup-btn upload-url-btn standout-btn" id="uploadUrlBtn">Upload URL</button>
			<div id="uploadUrlBtnProgressBar" style="display:none;width:220px;height:6px;background:#e3f2fd;border-radius:6px;overflow:hidden;margin:0.35rem 0 0 0;">
				<div id="uploadUrlBtnProgressFill" style="height:100%;width:0;background:#1976d2;transition:width 0.2s;"></div>
			</div>
			<button id="smartUploadBtn" class="setup-btn" style="margin-left:0.5rem;background:#0d47a1;color:#fff;border:none;padding:0.4rem 1rem;border-radius:4px;cursor:pointer;">SMART Upload (Upload + Sync)</button>
			<div id="smartUploadBtnProgressBar" style="display:none;width:220px;height:6px;background:#e8eaf6;border-radius:6px;overflow:hidden;margin:0.35rem 0 0.1rem 0.5rem;">
				<div id="smartUploadBtnProgressFill" style="height:100%;width:0;background:#0d47a1;transition:width 0.2s;"></div>
			</div>
			<button id="syncUploadedToRecipesBtn" style="margin-left:1rem;background:#388e3c;color:#fff;border:none;padding:0.4rem 1rem;border-radius:4px;cursor:pointer;">Sync Uploaded Recipes to Recipes Table</button>
			<div id="syncUploadedToRecipesBtnProgressBar" style="display:none;width:220px;height:6px;background:#e8f5e9;border-radius:6px;overflow:hidden;margin:0.35rem 0 0 1rem;">
				<div id="syncUploadedToRecipesBtnProgressFill" style="height:100%;width:0;background:#2e7d32;transition:width 0.2s;"></div>
			</div>
			<div id="uploadStatusBanner" style="display:none;margin-top:0.6rem;padding:0.55rem 0.7rem;border-radius:4px;font-size:0.92rem;"></div>
			<div id="uploadProgressText" style="margin-top:0.6rem;font-size:0.92rem;color:#0d47a1;display:none;"></div>
			<!-- Removed Extract Recipe Information and Clean up for Display sections as requested -->
		</div>
		<!-- Removed Raw Data Preview section as requested -->
		
		<!-- Removed Direct Linked Recipes Table and mainRecipesTable as requested -->
		<!-- Uploaded Recipes Table -->
		<div class="setup-section">
			<div class="setup-section-title">Uploaded Recipes</div>
			<div class="setup-section-desc">View details of uploaded recipes.</div>
			<table id="uploadedRecipesTable" style="width:100%;margin-top:1rem;border-collapse:collapse;">
				<thead>
					<tr style="background:#f5f5f5;">
						<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">ID</th>
						<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Recipe Title</th>
						<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Upload Type</th>
						<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Source URL</th>
						<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Uploaded By</th>
						<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Upload Date</th>
						<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Actions</th>
					</tr>
				</thead>
				<tbody>
					<!-- Populated by JS -->
				</tbody>
			</table>
		</div>
	</div>
	<script src="upload_url.js?v=20260408c"></script>
</body>
</html>
