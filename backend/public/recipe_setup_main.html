<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Recipe Setup Main</title>
	<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
	<!-- Shared Navbar Include -->
	<div id="navbar-include"></div>
	<script src="shared/navbar_loader.js"></script>
	<div class="setup-card" style="max-width:400px;margin:40px auto;text-align:center;">
		<h2>Recipe Setup</h2>
		<p>Select how you want to upload a recipe:</p>
		<button class="setup-btn" style="width:100%;margin-bottom:1rem;" onclick="location.href='upload_manual.html'">Manual Upload</button>
		<button class="setup-btn" style="width:100%;margin-bottom:1rem;" onclick="location.href='upload_pdf.html'">PDF Upload</button>
		<button class="setup-btn" style="width:100%;" onclick="location.href='upload_url.html'">URL Upload</button>
	</div>

	<!-- Published Recipes Table (recipe_display) -->
	<div class="setup-card" style="max-width:1100px;margin:40px auto 0 auto;text-align:left;">
		<h2 style="font-size:1.3rem;color:#1976d2;margin-bottom:0.7rem;">Published Recipes Table</h2>
		<div style="margin-bottom:1rem;color:#555;">These are the published recipes from the recipe_display table.</div>
		<table id="publishedRecipesTable" style="width:100%;margin-top:1rem;border-collapse:collapse;">
			<thead>
				<tr style="background:#f5f5f5;">
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">ID</th>
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Name</th>
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Description</th>
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Ingredients</th>
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Serving Size</th>
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">URL</th>
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Instructions</th>
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">RecipeID</th>
					<th style="padding:0.5rem 0.7rem;border:1px solid #eee;">Actions</th>
				</tr>
			</thead>
			<tbody>
				<!-- Populated by JS -->
			</tbody>
		</table>
	</div>

	<script>
	// Fetch and render published recipes from recipe_display table
	function fetchAndRenderPublishedRecipes() {
		fetch('/api/recipes/display-table')
			.then(res => res.json())
			.then(data => {
				const tbody = document.querySelector('#publishedRecipesTable tbody');
				if (!tbody) return;
				tbody.innerHTML = '';
				data.forEach(row => {
					const tr = document.createElement('tr');
					tr.innerHTML = `
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;'>${row.id}</td>
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;'>${row.name || ''}</td>
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;'>${row.description || ''}</td>
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;'>${row.ingredients || ''}</td>
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;'>${row.serving_size || ''}</td>
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;'>${row.url ? `<a href='${row.url}' target='_blank'>Link</a>` : ''}</td>
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;'>${row.instructions || ''}</td>
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;'>${row.recipeid || ''}</td>
						<td style='border:1px solid #eee;padding:0.5rem 0.7rem;text-align:center;'>
							<button class='unpublish-recipe-btn' data-id='${row.id}' style='background:#e53935;color:#fff;border:none;padding:0.4rem 0.8rem;border-radius:4px;cursor:pointer;'>Unpublish</button>
						</td>
					`;
					tbody.appendChild(tr);
				});
			});
	}
	document.addEventListener('DOMContentLoaded', fetchAndRenderPublishedRecipes);
	// Display/Unpublish button event handler for published recipes table
	document.body.addEventListener('click', async function(e) {
		if (e.target && e.target.classList.contains('display-recipe-btn')) {
			const recipeId = e.target.getAttribute('data-id');
			if (!recipeId) return;
			if (!confirm('Display this recipe? This will copy it to the recipe_display table.')) return;
			const resp = await fetch(`/api/recipes/${recipeId}/display`, { method: 'POST' });
			const data = await resp.json();
			if (data.success) {
				alert('Recipe sent to display table!');
				fetchAndRenderPublishedRecipes();
			} else {
				alert('Failed to display recipe: ' + (data.error || 'Unknown error'));
			}
		}
		if (e.target && e.target.classList.contains('unpublish-recipe-btn')) {
			const recipeId = e.target.getAttribute('data-id');
			if (!recipeId) return;
			if (!confirm('Unpublish this recipe? This will remove it from the recipe_display table.')) return;
			const resp = await fetch(`/api/recipes/display-table/${recipeId}`, { method: 'DELETE' });
			const data = await resp.json();
			if (data.success) {
				alert('Recipe unpublished!');
				fetchAndRenderPublishedRecipes();
			} else {
				alert('Failed to unpublish recipe: ' + (data.error || 'Unknown error'));
			}
		}
	});
	</script>
</body>
</html>
