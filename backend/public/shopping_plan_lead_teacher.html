<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Teacher Shopping View</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .ltv-wrap { max-width: 1200px; margin: 1.4rem auto 2.2rem; padding: 0 1rem; }
    .ltv-head { margin-bottom: 0.8rem; }
    .ltv-title { margin: 0; color: #173a58; font-size: 1.72rem; }
    .ltv-sub { margin: 0.35rem 0 0; color: #4b6073; }
    .ltv-card {
      background: #fff;
      border: 1px solid #c9d6e2;
      border-radius: 10px;
      padding: 0.95rem 1rem;
      box-shadow: 0 2px 8px rgba(8, 34, 56, 0.08);
      margin-bottom: 0.9rem;
    }
    .ltv-row { display: flex; flex-wrap: wrap; gap: 0.55rem; align-items: end; }
    .ltv-field { display: flex; flex-direction: column; gap: 0.3rem; min-width: 220px; }
    .ltv-field label { font-size: 0.9rem; font-weight: 700; color: #2a4051; }
    .ltv-field input, .ltv-field select {
      border: 1px solid #b6c8d8;
      border-radius: 7px;
      padding: 0.47rem 0.56rem;
      font: inherit;
      background: #fff;
    }
    .ltv-btn {
      border: none;
      border-radius: 7px;
      padding: 0.55rem 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    .ltv-btn.primary { background: #1f6eae; color: #fff; }
    .ltv-btn.primary:hover { background: #195e93; }
    .ltv-btn.secondary { background: #627889; color: #fff; }
    .ltv-btn.secondary:hover { background: #526474; }
    .ltv-meta { color: #5f7588; font-size: 0.9rem; margin-top: 0.45rem; }
    .ltv-status { min-height: 1.2rem; margin-top: 0.45rem; font-size: 0.92rem; font-weight: 700; }
    .ltv-status.ok { color: #1f7c4c; }
    .ltv-status.err { color: #b82f2f; }
    .ltv-mini-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.6rem; margin-bottom: 0.4rem; }
    .ltv-mini-title { margin: 0; color: #1d4464; font-size: 1rem; }
    .ltv-mini-sub { color: #5f7588; font-size: 0.82rem; }
    .ltv-mini-table-wrap { overflow-x: auto; }
    .ltv-mini-table { width: 100%; border-collapse: collapse; min-width: 720px; }
    .ltv-mini-table th, .ltv-mini-table td { border: 1px solid #e1eaf2; padding: 0.3rem 0.35rem; font-size: 0.78rem; vertical-align: top; }
    .ltv-mini-table th { background: #edf4fb; color: #2d4f68; text-align: center; }
    .ltv-mini-period { width: 52px; text-align: center; font-weight: 700; background: #f8fbff; color: #35536a; }
    .ltv-mini-cell { min-height: 50px; }
    .ltv-mini-chip { background: #f3f8ff; border: 1px solid #d8e6f7; border-radius: 5px; padding: 0.12rem 0.26rem; margin-bottom: 0.16rem; color: #20465f; line-height: 1.25; display: block; }
    .ltv-mini-chip:hover { background: #e9f2fd; border-color: #c6ddf6; }
    .ltv-mini-chip:last-child { margin-bottom: 0; }
    .ltv-mini-empty { color: #8ea0b0; text-align: center; }
    .ltv-grid {
      display: grid;
      gap: 0.8rem;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
    }
    .ltv-cat {
      border: 1px solid #262f38;
      border-radius: 0;
      overflow: hidden;
      background: #fff;
      min-height: 220px;
    }
    .ltv-cat h3 {
      margin: 0;
      background: #fff;
      color: #1e2a33;
      font-size: 0.92rem;
      padding: 0.34rem 0.45rem;
      border-bottom: 1px solid #262f38;
      text-decoration: underline;
    }
    .ltv-cat-body { padding: 0.42rem 0.45rem 0.7rem; }
    .ltv-day { margin-bottom: 0.8rem; }
    .ltv-day:last-child { margin-bottom: 0; }
    .ltv-day-name {
      font-weight: 700;
      color: #1f2c36;
      margin: 0;
      font-size: 0.9rem;
    }
    .ltv-lines {
      margin: 0.12rem 0 0;
      color: #1f2c36;
      font-size: 0.89rem;
      line-height: 1.34;
      white-space: normal;
    }
    .ltv-empty { color: #778899; }
    @media (max-width: 980px) {
      .ltv-grid { grid-template-columns: 1fr; }
    }
    @media print {
      body * { visibility: hidden !important; }
      #printArea, #printArea * { visibility: visible !important; }
      #printArea { position: absolute; inset: 0; background: #fff; }
      .ltv-card:first-child { display: none !important; }
      .ltv-wrap { max-width: none; margin: 0; padding: 0; }
      .ltv-card { border: none; border-radius: 0; box-shadow: none; padding: 0; margin: 0; }
      .ltv-grid { gap: 0.55rem; }
      .ltv-cat { min-height: 210px; break-inside: avoid; }
      .ltv-cat h3 { font-size: 0.9rem; padding: 0.2rem 0.38rem; }
      .ltv-day-name, .ltv-lines { font-size: 0.86rem; }
    }
  </style>
</head>
<body>
  <div id="navbar-include"></div>
  <script src="shared/navbar_loader.js"></script>

  <main class="ltv-wrap">
    <section class="ltv-head">
      <h1 class="ltv-title">Lead Teacher Shopping View</h1>
      <p class="ltv-sub">Finalized plan view by category and weekday, built from the same finalized shopping data used in Technician View.</p>
    </section>

    <section class="ltv-card">
      <div class="ltv-row">
        <div class="ltv-field" style="min-width:360px;">
          <label for="planSelect">Finalized plans</label>
          <select id="planSelect">
            <option value="">Loading finalized plans...</option>
          </select>
        </div>
        <div class="ltv-field">
          <label for="planIdInput">Finalized plan ID</label>
          <input id="planIdInput" type="number" min="1" step="1" placeholder="e.g. 42">
        </div>
        <button id="loadBtn" class="ltv-btn primary" type="button">Load Finalized Plan</button>
        <button id="printBtn" class="ltv-btn secondary" type="button">Print</button>
        <button id="csvBtn" class="ltv-btn secondary" type="button">Export CSV</button>
      </div>
      <div id="planMeta" class="ltv-meta"></div>
      <div id="status" class="ltv-status"></div>
    </section>

    <section class="ltv-card">
      <div class="ltv-mini-head">
        <h2 class="ltv-mini-title">Practical Calendar (Week Snapshot)</h2>
        <div id="practicalCalMeta" class="ltv-mini-sub"></div>
      </div>
      <div id="practicalCalBody" class="ltv-mini-table-wrap">
        <div class="ltv-meta">Load a finalized plan to view the practical calendar snapshot.</div>
      </div>
    </section>

    <section id="printArea" class="ltv-card">
      <div id="categoryGrid" class="ltv-grid">
        <div class="ltv-meta">Load a finalized plan ID to view weekday shopping needs.</div>
      </div>
    </section>
  </main>

  <script>
  (function () {
    const planSelect = document.getElementById('planSelect');
    const planIdInput = document.getElementById('planIdInput');
    const loadBtn = document.getElementById('loadBtn');
    const printBtn = document.getElementById('printBtn');
    const csvBtn = document.getElementById('csvBtn');
    const planMeta = document.getElementById('planMeta');
    const statusEl = document.getElementById('status');
    const practicalCalMeta = document.getElementById('practicalCalMeta');
    const practicalCalBody = document.getElementById('practicalCalBody');
    const categoryGrid = document.getElementById('categoryGrid');

    let currentPayload = null;

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg || '';
      statusEl.className = 'ltv-status' + (type ? ' ' + type : '');
    }

    function toDateOnly(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      const isoLike = raw.slice(0, 10);
      if (/^\d{4}-\d{2}-\d{2}$/.test(isoLike)) return isoLike;
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return '';
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function formatHumanDate(value) {
      const iso = toDateOnly(value);
      if (!iso) return String(value || '');
      const d = new Date(iso + 'T00:00:00');
      if (Number.isNaN(d.getTime())) return iso;
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return String(d.getDate()) + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    function isoWeekNumber(dateValue) {
      const source = new Date(dateValue);
      if (Number.isNaN(source.getTime())) return null;
      const utcDate = new Date(Date.UTC(source.getFullYear(), source.getMonth(), source.getDate()));
      const day = utcDate.getUTCDay() || 7;
      utcDate.setUTCDate(utcDate.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(utcDate.getUTCFullYear(), 0, 1));
      return Math.ceil((((utcDate - yearStart) / 86400000) + 1) / 7);
    }

    function mondayToFridayFromWeekEnding(weekEndingValue) {
      const iso = toDateOnly(weekEndingValue);
      if (!iso) return { monday: null, friday: null };
      const friday = new Date(iso + 'T00:00:00');
      if (Number.isNaN(friday.getTime())) return { monday: null, friday: null };
      const monday = new Date(friday);
      monday.setDate(friday.getDate() - 4);
      return { monday, friday };
    }

    function formatRangeDateNoYear(dateValue) {
      const d = new Date(dateValue);
      if (Number.isNaN(d.getTime())) return '';
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return String(d.getDate()) + ' ' + months[d.getMonth()];
    }

    function buildWeekLabel(weekEndingValue) {
      const range = mondayToFridayFromWeekEnding(weekEndingValue);
      if (!range.monday || !range.friday) return '';
      const weekNo = isoWeekNumber(range.monday);
      const prefix = Number.isInteger(weekNo) ? ('Week ' + weekNo + ' ') : '';
      return prefix + '(' + formatRangeDateNoYear(range.monday) + ' - ' + formatHumanDate(range.friday) + ')';
    }

    function toIsoLocalDate(dateValue) {
      const d = new Date(dateValue);
      if (Number.isNaN(d.getTime())) return '';
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function shortDayLabel(dateValue) {
      const d = new Date(dateValue);
      if (Number.isNaN(d.getTime())) return '';
      const w = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const idx = (d.getDay() + 6) % 7;
      return w[idx] + ' ' + String(d.getDate()) + '/' + String(d.getMonth() + 1);
    }

    function parsePeriodValue(periodValue) {
      const raw = String(periodValue || '').trim().toUpperCase();
      if (!raw) return null;
      const m = raw.match(/(\d+)/);
      if (!m) return null;
      const n = Number(m[1]);
      return Number.isInteger(n) && n >= 1 && n <= 5 ? n : null;
    }

    async function renderPracticalCalendar(plan) {
      if (!plan || !plan.week_ending) {
        practicalCalMeta.textContent = '';
        practicalCalBody.innerHTML = '<div class="ltv-meta">Load a finalized plan to view the practical calendar snapshot.</div>';
        return;
      }

      const range = mondayToFridayFromWeekEnding(plan.week_ending);
      if (!range.monday || !range.friday) {
        practicalCalMeta.textContent = '';
        practicalCalBody.innerHTML = '<div class="ltv-meta">Could not resolve week range for this plan.</div>';
        return;
      }

      const days = [];
      for (let i = 0; i < 5; i++) {
        const d = new Date(range.monday);
        d.setDate(range.monday.getDate() + i);
        days.push(d);
      }

      const start = toIsoLocalDate(days[0]);
      const end = toIsoLocalDate(days[4]);
      practicalCalMeta.textContent = shortDayLabel(days[0]) + ' to ' + shortDayLabel(days[4]);
      practicalCalBody.innerHTML = '<div class="ltv-meta">Loading practical calendar...</div>';

      try {
        const resp = await fetch('/api/bookings/all?start=' + encodeURIComponent(start) + '&end=' + encodeURIComponent(end) + '&fields=calendar', { credentials: 'include' });
        const payload = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(payload.error || 'Failed to load practical calendar.');

        const rows = Array.isArray(payload.bookings) ? payload.bookings : [];
        const grid = {};
        for (let p = 1; p <= 5; p++) {
          grid[p] = {};
          days.forEach((d) => { grid[p][toIsoLocalDate(d)] = []; });
        }

        rows.forEach((b) => {
          const iso = toDateOnly(b.booking_date);
          const p = parsePeriodValue(b.period);
          if (!iso || !p || !grid[p] || !grid[p][iso]) return;
          if (String(b.period || '').toLowerCase() === 'planner') return;
          const primary = String((b.linked_recipe_name || b.recipe || b.class_name || '')).trim();
          const secondary = String((b.staff_name || '')).trim();
          grid[p][iso].push({
            id: Number(b.id),
            text: (primary || 'Booking') + (secondary ? ' - ' + secondary : '')
          });
        });

        let html = '<table class="ltv-mini-table"><thead><tr><th>Period</th>';
        html += days.map((d) => '<th>' + esc(shortDayLabel(d)) + '</th>').join('');
        html += '</tr></thead><tbody>';

        for (let p = 1; p <= 5; p++) {
          html += '<tr><td class="ltv-mini-period">P' + p + '</td>';
          for (let i = 0; i < days.length; i++) {
            const iso = toIsoLocalDate(days[i]);
            const items = grid[p][iso] || [];
            if (!items.length) {
              html += '<td class="ltv-mini-cell ltv-mini-empty">-</td>';
              continue;
            }
            const shown = items.slice(0, 2);
            const weekStart = toIsoLocalDate(days[0]);
            let chips = shown.map((entry) => {
              const bookingId = Number(entry && entry.id);
              const href = 'browse_practicals.html?booking_id=' + encodeURIComponent(String(bookingId)) + '&week_start=' + encodeURIComponent(weekStart) + '&auto_print_booking=1';
              return '<a class="ltv-mini-chip" href="' + esc(href) + '" target="_blank" title="Open worksheet print">' + esc(entry && entry.text ? entry.text : '') + '</a>';
            }).join('');
            if (items.length > shown.length) {
              chips += '<div class="ltv-mini-chip">+' + (items.length - shown.length) + ' more</div>';
            }
            html += '<td class="ltv-mini-cell">' + chips + '</td>';
          }
          html += '</tr>';
        }

        html += '</tbody></table>';
        practicalCalBody.innerHTML = html;
      } catch (err) {
        practicalCalBody.innerHTML = '<div class="ltv-meta">' + esc(err.message || 'Failed to load practical calendar.') + '</div>';
      }
    }

    function normalizeUnit(value) {
      const u = String(value || '').trim().toLowerCase();
      if (!u) return '';
      if (['teaspoon', 'teaspoons', 'tsp'].includes(u)) return 'tsp';
      if (['tablespoon', 'tablespoons', 'tbsp', 'tbs', 'tblsp'].includes(u)) return 'tbsp';
      if (['gram', 'grams', 'g'].includes(u)) return 'g';
      if (['kilogram', 'kilograms', 'kg'].includes(u)) return 'kg';
      if (['milliliter', 'milliliters', 'millilitre', 'millilitres', 'ml'].includes(u)) return 'ml';
      if (['liter', 'liters', 'litre', 'litres', 'l'].includes(u)) return 'l';
      return u;
    }

    function formatQty(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '';
      return n.toFixed(1).replace(/\.0$/, '');
    }

    function toPurchaseUnit(qtyValue, unitValue) {
      const qty = Number(qtyValue);
      const unit = normalizeUnit(unitValue);
      if (!Number.isFinite(qty)) {
        return { qty: '', unit: String(unitValue || '') };
      }

      if (unit === 'tsp' && Math.abs(qty) >= 3) {
        return { qty: formatQty(qty / 3), unit: 'tbsp' };
      }
      if (unit === 'g' && Math.abs(qty) >= 1000) {
        return { qty: formatQty(qty / 1000), unit: 'kg' };
      }
      if (unit === 'ml' && Math.abs(qty) >= 1000) {
        return { qty: formatQty(qty / 1000), unit: 'l' };
      }

      return { qty: formatQty(qty), unit: String(unitValue || '') };
    }

    function canonicalCategoryKey(name) {
      const value = String(name || '').trim().toLowerCase();
      if (!value) return 'uncategorised';
      if (value.includes('meat')) return 'meat';
      if (value.includes('dairy') || value.includes('pastry')) return 'dairy_pastry';
      if (value.includes('pantry') || value.includes('dry ingredients') || value.includes('tinned') || value.includes('condiment')) return 'pantry_dry_tinned';
      if (value.includes('egg')) return 'eggs';
      if (value.includes('cleaning')) return 'cleaning_products';
      if (value.includes('produce') || value.includes('fruit') || value.includes('vegetable')) return 'produce_fruit_vegetables';
      if (value === 'other' || value.startsWith('other')) return 'other_other';
      if (value.includes('uncategorised') || value.includes('uncategorized')) return 'uncategorised';
      if (value.includes('action')) return 'action';
      return 'extra:' + value;
    }

    function categoryHeading(key) {
      const labels = {
        meat: 'Meat',
        dairy_pastry: 'Dairy & Pastry',
        pantry_dry_tinned: 'Pantry: Dry Ingredients & Tinned Food',
        eggs: 'Eggs',
        cleaning_products: 'Cleaning Products',
        produce_fruit_vegetables: 'Produce: Fruit & Vegetables',
        other_other: 'Other: Other',
        uncategorised: 'Uncategorised',
        action: 'Action'
      };
      if (labels[key]) return labels[key];
      if (String(key).startsWith('extra:')) {
        const raw = String(key).slice(6);
        return raw ? (raw.charAt(0).toUpperCase() + raw.slice(1)) : 'Other';
      }
      return String(key || 'Other');
    }

    function isNonShoppingMetadataItem(nameValue) {
      const raw = String(nameValue || '').trim();
      if (!raw) return true;
      const normalized = raw
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      if (!normalized) return true;
      if (/^serves(\s+\d+)+\s+serves?$/.test(normalized)) return true;
      if (/\b\d+(?:\.\d+)?\s*serves?\b/.test(normalized) || /\bserves?\s+\d+\b/.test(normalized)) return true;
      if (/\bmg\b/.test(normalized) || /\bkj\b/.test(normalized) || /\bkilojoules?\b/.test(normalized)) return true;
      if (/\b(total\s+fat|saturated\s+fat|carbohydrate|sugars?|sodium|dietary\s+fib(?:re|er)|protein|energy|kilojoules?|kj)\b/.test(normalized)) {
        return true;
      }
      const metaOnly = normalized
        .replace(/\b(?:serves?|mg|kj|kilojoules?|total|fat|saturated|sodium|dietary|fibre|fiber|carbohydrate|carbohydrates|sugars?|protein|energy)\b/g, ' ')
        .replace(/\d+(?:\.\d+)?/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      if (!metaOnly) return true;
      return false;
    }

    function renderDayRows(dayRows) {
      const rows = Array.isArray(dayRows) ? dayRows : [];
      const visible = rows.filter((r) => !isNonShoppingMetadataItem(r && r.item_name));
      if (!visible.length) return '<div class="ltv-empty">-</div>';
      return '<div class="ltv-lines">' + visible.map((r) => {
        const purchase = toPurchaseUnit(r.final_qty, r.base_unit);
        const qtyPart = purchase.qty ? (purchase.qty + ' ') : '';
        const unitPart = purchase.unit ? (purchase.unit + ' ') : '';
        const notesPart = r && r.notes ? (' - ' + String(r.notes)) : '';
        return esc((qtyPart + unitPart + String((r && r.item_name) || '') + notesPart).trim());
      }).join('<br>') + '</div>';
    }

    function renderCategoryCard(title, dayMap) {
      const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
      const hasUnscheduled = Array.isArray(dayMap && dayMap.Unscheduled) && dayMap.Unscheduled.length > 0;
      if (hasUnscheduled) days.push('Unscheduled');

      return '<section class="ltv-cat">'
        + '<h3>' + esc(title) + '</h3>'
        + '<div class="ltv-cat-body">'
        + days.map((day) => {
          return '<div class="ltv-day">'
            + '<p class="ltv-day-name">' + esc(day) + ' :</p>'
            + renderDayRows(dayMap ? dayMap[day] : [])
            + '</div>';
        }).join('')
        + '</div>'
        + '</section>';
    }

    async function loadFinalizedPlanOptions(selectedId) {
      const resp = await fetch('/api/shopping-plan', { credentials: 'include' });
      const payload = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(payload.error || 'Failed to load plan list.');

      const plans = (Array.isArray(payload.plans) ? payload.plans : [])
        .filter((p) => String(p.status || '').toLowerCase() === 'finalized');

      if (!plans.length) {
        planSelect.innerHTML = '<option value="">No finalized plans found</option>';
        return;
      }

      planSelect.innerHTML = '<option value="">Select finalized plan...</option>' + plans.map((p) => {
        const weekLabel = buildWeekLabel(p.week_ending);
        const label = (weekLabel || ('Week ending ' + formatHumanDate(p.week_ending)))
          + ' | Version ' + String(p.version || '')
          + ' | Plan #' + String(p.id || '');
        return '<option value="' + Number(p.id) + '">' + esc(label) + '</option>';
      }).join('');

      if (selectedId && plans.some((p) => Number(p.id) === Number(selectedId))) {
        planSelect.value = String(selectedId);
      }
    }

    function render(payload) {
      currentPayload = payload;
      const plan = payload.plan || {};
      const weekdayCategories = payload.weekday_categories || {};

      renderPracticalCalendar(plan);

      planMeta.textContent =
        'Plan #' + plan.id
        + ' | ' + (buildWeekLabel(plan.week_ending) || ('Week ending: ' + formatHumanDate(plan.week_ending)))
        + ' | Version: ' + (plan.version || '')
        + ' | Finalized by: ' + (plan.finalized_by || 'unknown');

      const names = Object.keys(weekdayCategories);
      if (!names.length) {
        categoryGrid.innerHTML = '<div class="ltv-meta">No weekday breakdown available for this finalized plan.</div>';
        return;
      }

      const grouped = {};
      names.forEach((cat) => {
        const key = canonicalCategoryKey(cat);
        if (!grouped[key]) grouped[key] = {};
        const dayObj = weekdayCategories[cat] || {};

        Object.keys(dayObj).forEach((day) => {
          if (!grouped[key][day]) grouped[key][day] = [];
          const rows = Array.isArray(dayObj[day]) ? dayObj[day] : [];
          grouped[key][day] = grouped[key][day].concat(rows);
        });
      });

      const ordered = [
        'meat',
        'dairy_pastry',
        'pantry_dry_tinned',
        'eggs',
        'cleaning_products',
        'produce_fruit_vegetables',
        'other_other',
        'uncategorised',
        'action'
      ];

      const remaining = Object.keys(grouped).filter((k) => !ordered.includes(k)).sort();
      const keys = ordered.concat(remaining).filter((k) => grouped[k]);

      categoryGrid.innerHTML = keys.map((key) => renderCategoryCard(categoryHeading(key), grouped[key])).join('');
    }

    async function loadPlan(id) {
      setStatus('Loading finalized plan...', '');
      const resp = await fetch('/api/shopping-plan/' + id + '/technician-view', { credentials: 'include' });
      const payload = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(payload.error || 'Failed to load lead teacher view.');
      render(payload);
      setStatus('Lead Teacher shopping view loaded.', 'ok');
    }

    function toCsv() {
      if (!currentPayload || !currentPayload.weekday_categories) return '';
      const lines = ['Category,Weekday,Item,Qty,Unit,Notes'];
      Object.keys(currentPayload.weekday_categories).forEach((cat) => {
        const dayObj = currentPayload.weekday_categories[cat] || {};
        Object.keys(dayObj).forEach((day) => {
          const rows = Array.isArray(dayObj[day]) ? dayObj[day] : [];
          rows.forEach((r) => {
            if (isNonShoppingMetadataItem(r && r.item_name)) return;
            const purchase = toPurchaseUnit(r.final_qty, r.base_unit);
            const vals = [
              cat,
              day,
              r.item_name || '',
              purchase.qty,
              purchase.unit || '',
              r.notes || ''
            ].map((v) => '"' + String(v).replace(/"/g, '""') + '"');
            lines.push(vals.join(','));
          });
        });
      });
      return lines.join('\n');
    }

    loadBtn.addEventListener('click', async () => {
      try {
        const selected = Number(planSelect.value);
        const typed = Number(planIdInput.value);
        const id = Number.isInteger(selected) && selected > 0 ? selected : typed;
        if (!Number.isInteger(id) || id <= 0) throw new Error('Enter a valid plan ID.');
        planIdInput.value = String(id);
        planSelect.value = String(id);
        await loadPlan(id);
      } catch (err) {
        setStatus(err.message, 'err');
      }
    });

    planSelect.addEventListener('change', () => {
      const id = Number(planSelect.value);
      if (Number.isInteger(id) && id > 0) {
        planIdInput.value = String(id);
      }
    });

    printBtn.addEventListener('click', () => {
      if (!currentPayload) {
        setStatus('Load a finalized plan before printing.', 'err');
        return;
      }
      window.print();
    });

    csvBtn.addEventListener('click', () => {
      if (!currentPayload) {
        setStatus('Load a finalized plan before exporting.', 'err');
        return;
      }
      const csv = toCsv();
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const pid = (currentPayload.plan && currentPayload.plan.id) ? String(currentPayload.plan.id) : 'plan';
      a.href = url;
      a.download = 'lead_teacher_shopping_plan_' + pid + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    (async function init() {
      try {
        await loadFinalizedPlanOptions(null);
        const q = new URLSearchParams(window.location.search);
        const id = Number(q.get('plan_id'));
        if (Number.isInteger(id) && id > 0) {
          planIdInput.value = String(id);
          planSelect.value = String(id);
          await loadPlan(id);
        }
      } catch (err) {
        setStatus(err.message || 'Failed to initialize Lead Teacher Shopping View.', 'err');
      }
    })();
  })();
  </script>
</body>
</html>
