<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Book</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #f7fafd;
    }
    .main-center-card {
      max-width: 900px;
      margin: 2.5rem auto 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2.5rem 2.5rem 2rem 2.5rem;
    }
    .main-title {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      color: #1976d2;
      letter-spacing: 1px;
    }
    .main-subaction {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .main-subaction button {
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      border: none;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    .recipe-card-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.2rem;
      margin-top: 2rem;
    }
    @media (max-width: 900px) {
      .recipe-card-list {
        grid-template-columns: 1fr;
      }
    }
    .recipe-card {
      display: flex;
      align-items: center;
      gap: 2.2rem;
      background: #f5f8fa;
      border-radius: 12px;
      box-shadow: 0 1px 6px #0001;
      padding: 1.7rem 2.2rem;
      min-height: 120px;
    }
    .recipe-id {
      font-size: 2.8rem;
      font-weight: 800;
      color: #1976d2;
      min-width: 70px;
      text-align: center;
      letter-spacing: 2px;
      flex-shrink: 0;
    }
    .recipe-name {
      font-size: 1.45rem;
      font-weight: 600;
      color: #222;
      word-break: break-word;
      flex: 1 1 auto;
    }
  </style>
</head>
<body>
  <div id="navbar-include"></div>
  <script src="shared/navbar_loader.js"></script>

  <div class="main-center-card">
    <h1 class="main-title">Recipe Book</h1>
    <div class="main-subaction">
      <button onclick="window.location.href='suggest_recipe.html'">Suggest a Recipe</button>
    </div>
    <div id="recipeCardList" class="recipe-card-list"></div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="globalLoading" class="loading-spinner" style="display:none;"></div>
  <div id="errorState" class="text-muted" style="display:none;">An error occurred. Please try again later.</div>
  <div id="emptyState" class="text-muted" style="display:none;">No data available.</div>

  <script src="display_recipe_book.js"></script>
</body>
</html>
