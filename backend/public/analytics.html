<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Analytics</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .w3-bar { border-radius: 8px; }
    .w3-container { margin-top: 2rem; }
    .w3-card { border-radius: 8px; }
    .analytics-header { font-size: 2rem; font-weight: 600; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div id="navbar-include"></div>
  <script src="shared/navbar_loader.js"></script>

  <div class="w3-container">
    <div class="analytics-header">Analytics Dashboard</div>
    <div class="w3-row-padding">
      <div class="w3-quarter">
        <div class="w3-card w3-padding w3-center">
          <i class="fa fa-users w3-xxlarge"></i>
          <h3>1,234</h3>
          <p>Users</p>
        </div>
      </div>
      <div class="w3-quarter">
        <div class="w3-card w3-padding w3-center">
          <i class="fa fa-utensils w3-xxlarge"></i>
          <h3>567</h3>
          <p>Recipes</p>
        </div>
      </div>
      <div class="w3-quarter">
        <div class="w3-card w3-padding w3-center">
          <i class="fa fa-calendar-check w3-xxlarge"></i>
          <h3>89</h3>
          <p>Bookings</p>
        </div>
      </div>
      <div class="w3-quarter">
        <div class="w3-card w3-padding w3-center">
          <i class="fa fa-chart-line w3-xxlarge"></i>
          <h3>42</h3>
          <p>Active Classes</p>
        </div>
      </div>
    </div>
    <div class="w3-row-padding" style="margin-top:2rem;">
      <div class="w3-half">
        <div class="w3-card w3-padding">
          <h4><i class="fa fa-chart-bar"></i> Usage Trends</h4>
          <div style="height:180px;background:#f1f1f1;border-radius:6px;text-align:center;line-height:180px;color:#888;">[Chart Placeholder]</div>
        </div>
      </div>
      <div class="w3-half">
        <div class="w3-card w3-padding">
          <h4><i class="fa fa-comments"></i> Recent Activity</h4>
          <ul class="w3-ul">
            <li>User Maryke added a new recipe.</li>
            <li>Class 100COMP booked for next week.</li>
            <li>Vanessa submitted a suggestion.</li>
            <li>Settings updated by Admin.</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
