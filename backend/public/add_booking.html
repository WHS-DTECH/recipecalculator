<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-include"></div>
    <script src="shared/navbar_loader.js"></script>
    <div class="calendar-app add-booking-page">
        <div class="add-booking-shell">
            <aside class="add-booking-left-panel">
                <div class="add-booking-side-card">
                    <div class="add-booking-side-title">Teacher Timetable</div>
                    <iframe
                        src="book_a_class.html?view=teacher_embed&hide_save_booking=1&hide_booking_form=1&hide_student_panel=1"
                        title="Teacher Timetable"
                        class="add-booking-timetable-iframe"
                        loading="lazy">
                    </iframe>
                </div>
            </aside>

            <section class="add-booking-main-panel">
                <h1>Add Booking</h1>
                <div class="add-booking-toolbar">
                    <div id="calendarWeekLabel" class="add-booking-week-label">Week of 02/02/26 to 06/02/26</div>
                    <div class="add-booking-toolbar-actions">
                        <button id="prevWeekBtn">&larr; Previous</button>
                        <button id="todayBtn">Today</button>
                        <button id="nextWeekBtn">Next &rarr;</button>
                        <button id="printScheduleBtn" class="add-booking-print-btn">Print Schedule (A4)</button>
                        <button id="printScheduleByRecipeBtn" class="add-booking-print-btn" style="background:#455a64;">Print by Recipe</button>
                        <select id="scheduleViewModeSelect" title="Calendar cell display mode" style="padding:0.4rem 0.6rem;border:1px solid #90a4ae;border-radius:5px;font-size:0.92rem;background:#fff;cursor:pointer;">
                            <option value="class">Show: Class</option>
                            <option value="recipe">Show: Recipe</option>
                        </select>
                    </div>
                </div>
                <div class="calendar-wrap add-booking-calendar-wrap">
                    <table class="calendar-table" id="scheduleCalendarTable"></table>
                </div>

                <div class="add-booking-side-card add-booking-inline-form-card">
                    <div class="add-booking-side-title">Book a Class</div>
                    <iframe
                        src="book_a_class.html?view=teacher_embed&hide_save_booking=1&form_only=1"
                        title="Teacher Book a Class Controls"
                        class="add-booking-form-iframe"
                        loading="lazy">
                    </iframe>
                </div>

            </section>

            <aside class="add-booking-right-panel">
                <div class="add-booking-side-card add-booking-students-card">
                    <div class="add-booking-side-title">Students In Selected Class</div>
                    <div class="add-booking-side-copy">The selected class list stays visible on the right-hand side of the calendar on wide screens.</div>
                    <iframe
                        src="book_a_class.html?view=teacher_embed&student_list_only=1"
                        title="Students In Selected Class"
                        class="add-booking-students-iframe"
                        loading="lazy">
                    </iframe>
                </div>
            </aside>
        </div>
    </div>
    <script>
        window.bookingPageLabel = 'Add Booking';
    </script>
    <script src="schedule_calendar.js"></script>
</body>
</html>
